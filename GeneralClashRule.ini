custom_proxy_group=ZProxy`url-test`.*`http://www.gstatic.com/generate_204`30,,300
custom_proxy_group=美国节点分组`fallback`(?i)(美国)`http://www.gstatic.com/generate_204`30
custom_proxy_group=香港节点分组`fallback`(?i)(香港)`http://www.gstatic.com/generate_204`30
custom_proxy_group=日本节点分组`fallback`(?i)(日本)`http://www.gstatic.com/generate_204`30
custom_proxy_group=台湾节点分组`fallback`(?i)(台湾)`http://www.gstatic.com/generate_204`30
custom_proxy_group=低倍率节点分组`fallback`(?i)[xX]0\.[1-9]`http://www.gstatic.com/generate_204`30
custom_proxy_group=OpenAI节点分组`fallback`[]美国节点分组

enable_rule_generator=true
overwrite_original_rules=true
